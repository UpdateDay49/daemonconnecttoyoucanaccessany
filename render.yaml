version: '3.8'

services:
  proxy-gateway:
    build: .
    ports:
      - "3000:3000"
    environment:
      - TOR_SOCKS=socks5h://tor-daemon:9050
      - I2P_SOCKS=socks5h://i2pd-daemon:4447
    depends_on:
      - tor-daemon
      - i2pd-daemon

  tor-daemon:
    image: osminogin/tor-simple
    expose:
      - "9050"

  i2pd-daemon:
    image: purplei2p/i2pd
    expose:
      - "4447" 
